services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  app:
    image: ghcr.io/tororossolgd/epam-python-project:latest
    depends_on:
      - db
      - minio
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Project Dashboard API
      APP_VERSION: 0.1.0
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/app
      JWT_SECRET: change_me_to_long_random_string
      JWT_EXPIRES_MINUTES: 60
      STORAGE_DIR: storage
      ALLOWED_DOCUMENT_EXTENSIONS: .pdf,.docx
      ALLOWED_DOCUMENT_CONTENT_TYPES: application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document
      MAX_DOCUMENT_SIZE_BYTES: 10485760
      USE_S3_STORAGE: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: project-documents
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_USE_SSL: "false"

volumes:
  pgdata:
  minio_data: